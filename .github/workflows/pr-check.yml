name: PR Check (P-1 W7)

# Runs on every PR: Vitest + lint + build + C4.1 regression.
# Phase 2 P-1 W7 — auto-block PRs that break units or shift dimension-mapping
# weights below the C4.1 gate.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        # --include=optional: ensure Linux-only optional deps (e.g. @emnapi/*) install
        # even when package-lock.json was generated on Windows (cross-platform drift).
        run: npm ci --include=optional

      - name: ESLint
        run: npm run lint

      - name: Vitest unit tests
        run: npm test

      - name: Coverage thresholds (A6)
        run: npm run test:coverage

      - name: JSON Schema validation (T1.1)
        run: node scripts/validate-schemas.mjs

      - name: Skill ontology validation (p2a-ontology PR-1, gate 13)
        run: node scripts/validate-skill-ontology.mjs

      - name: README counter freshness (T2.1)
        run: node scripts/update-readme-counters.mjs --check

      - name: Dim coverage check (v11 — keyVariable 매핑 진단)
        # Detects hidden defects like D1_Form having 0 keyVariables (v10 finding).
        # Currently exits 1 (D1_Form MISSING) — accepted state until option A' PR.
        # Use --strict to escalate "declared without evidence" to fail. Once
        # option A' lands the script will exit 0 → flip continue-on-error to false.
        continue-on-error: true
        run: node scripts/check-dim-coverage.mjs

      - name: C4.1 dimension-mapping regression
        run: |
          mkdir -p out
          node scripts/synthetic-validation-c4-1.mjs > out/c4-1-pr-check.md
          # Verify still PASS — fail if either gate breaches
          TAU=$(grep "Kendall tau (median)" out/c4-1-pr-check.md | grep -oE "[0-9]+\.[0-9]+" | head -1)
          CONT=$(grep "도메인 모순 (50셀 중)" out/c4-1-pr-check.md | grep -oE "[0-9]+" | head -1)
          echo "C4.1: tau=$TAU contradictions=$CONT"
          awk -v t="$TAU" 'BEGIN { exit (t < 0.4) ? 1 : 0 }' || { echo "::error::C4.1 FAIL (tau $TAU < 0.4)"; exit 1; }
          if [ "$CONT" != "0" ]; then echo "::error::C4.1 FAIL ($CONT contradictions)"; exit 1; fi
          echo "::notice::C4.1 PASS (tau $TAU, $CONT contradictions)"

      - name: C4.2 diversity sanity check
        run: |
          node scripts/c4-2-diversity.mjs > out/c4-2-pr-check.md
          # C4.2 is probabilistic — log but don't gate
          grep "Jaccard median" out/c4-2-pr-check.md || true

      - name: Next.js build
        run: npm run build

      - name: Install Playwright browsers (cached)
        run: npx playwright install --with-deps chromium

      - name: A11y e2e (axe-core, 6 routes × 2 viewports = 12)
        env:
          CI: "true"
        run: npx playwright test
        # webServer block in playwright.config.ts auto-starts `next start` on CI

      - name: Cross-repo link check (smilepat/* references)
        run: node scripts/check-cross-repo-links.mjs

      - name: Upload C4 reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: c4-pr-reports
          path: out/c4-*-pr-check.md

      - name: Upload Playwright trace on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
